name: Build VibeSurveyor

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme VibeSurveyor \
            -project VibeSurveyor/VibeSurveyor.xcodeproj \
            -archivePath build/VibeSurveyor.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            -destination 'generic/platform=iOS'

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/VibeSurveyor.xcarchive/Products/Applications/VibeSurveyor.app \
            build/ipa/Payload/VibeSurveyor.app
          cd build/ipa
          zip -r ../VibeSurveyor.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSurveyor-IPA
          path: build/VibeSurveyor.ipa
