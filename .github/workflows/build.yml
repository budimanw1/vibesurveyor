name: Build VibeSurveyor

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme VibeSurveyor \
            -project VibeSurveyor/VibeSurveyor.xcodeproj \
            -archivePath build/VibeSurveyor.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            -destination 'generic/platform=iOS'

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSurveyor-xcarchive
          path: build/VibeSurveyor.xcarchive
